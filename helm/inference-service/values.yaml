---
image:
  repository: 533267178572.dkr.ecr.us-east-1.amazonaws.com/kinetics-training
  tag: serve-1b1fcae
  pullPolicy: IfNotPresent
replicaCount: 1 # only used when autoscaling.enabled = false (KEDA owns replicas otherwise)
# KEDA autoscaling for the FastAPI inference Rollout. When enabled, a ScaledObject
# targets the Rollout and KEDA (via a managed HPA) scales it on a Prometheus
# query — the Rollout's static `replicaCount` above is then dropped so the two
# don't fight. Default trigger is the in-cluster kube-prometheus-stack (the same
# server the Rollout analysis gate uses): lower latency, no remote_write lag, no
# per-query cost. Set amp.enabled to drive scaling off AWS Managed Prometheus
# instead (SigV4 via EKS Pod Identity — needs a KEDA Pod Identity role in
# terraform, and point prometheusAddress at the AMP query URL).
autoscaling:
  enabled: true
  minReplicaCount: 1 # set 0 for scale-to-zero (adds a cold start: init-pull + model load)
  maxReplicaCount: 5
  pollingInterval: 15 # seconds between metric checks
  cooldownPeriod: 120 # seconds of no activity before scaling down (toward min)
  scaleDownStabilizationSeconds: 120 # HPA scale-down damping to avoid flapping
  # Target requests/sec PER replica — KEDA scales so (query / replicas) ~ threshold.
  threshold: "20"
  activationThreshold: "1" # scale 0->1 once real traffic appears (only matters if min=0)
  prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
  query: sum(rate(inference_requests_total[1m]))
  amp:
    enabled: false # true = query AMP via SigV4 (set prometheusAddress to the AMP query URL)
    awsRegion: us-east-1
# Edge mode: when enabled, the app runs as a thin edge and delegates the model
# forward-pass to a Seldon model/experiment (kinetics_trainer.serving.remote_predictor),
# so the S3 model init-container is skipped. Disable to run the model in-process
# (local mode) from the `model.s3Uri` artifact instead.
seldon:
  enabled: true
  endpoint: "http://seldon-mesh.seldon-mesh"
  model: kinetics-cnn-lstm # the Experiment name (Seldon routes the A/B)
  timeoutSeconds: 30
# Progressive delivery via Argo Rollouts (blue/green). A new edge image comes up
# as the preview (green), is gated by analysis, then promoted to active (blue).
rollout:
  autoPromotionEnabled: false # require the analysis gate (or manual) to promote
  analysis:
    enabled: true
    prometheusAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
    interval: 1m
    count: 3
    failureLimit: 1
    maxErrorRate: 0.05 # abort promotion if green's 5xx ratio >= 5%
# Model artifact: an initContainer pulls it from S3 into a shared emptyDir, so the
# app starts with MODEL_DIR populated. Point this at a directory holding
# model.pth + model_config.json + label_map.json.
model:
  s3Uri: s3://kinetics-pipeline-dev-checkpoints-533267178572/cnn-lstm/model/
  mountPath: /opt/ml/model
  awscliImage: amazon/aws-cli:2.17.0
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: false
  className: alb
  scheme: internal
  tls: true # HTTPS:443 (cert auto-discovered by host); false = HTTP:80
  host: ""
  certificateArn: ""
  loadBalancerName: kinetics-inference
  wafAclArn: "" # prod public ALB: terraform output inference_api_waf_arn
  annotations: {}
# App-level prod hardening for the FastAPI edge. All empty/true here = dev posture
# (docs on, no CORS, no auth). sync-gitops-values sets these for prod:
#   enableDocs=false, corsAllowOrigins=<spa url>, cognito.issuer=<cognito_issuer>,
#   cognito.audience="<spa_client_id>,<machine_client_id>".
app:
  enableDocs: "true"
  corsAllowOrigins: ""
  cognito:
    issuer: ""
    audience: ""
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    labels:
      release: kube-prometheus-stack
# Optional OTLP tracing. Points at the in-cluster collector by default; the app
# no-ops if this is empty (see kinetics_trainer.observability).
observability:
  otelExporterOtlpEndpoint: "http://otel-collector.observability:4318"
  serviceName: kinetics-inference
  logLevel: INFO
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
serviceAccount:
  create: true
  name: ""
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::533267178572:role/kinetics-inference-s3-read
nodeSelector: {}
tolerations: []
affinity: {}
