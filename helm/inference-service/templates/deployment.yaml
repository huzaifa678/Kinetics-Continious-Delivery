apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kinetics-inference.fullname" . }}
  labels:
    {{- include "kinetics-inference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kinetics-inference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kinetics-inference.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kinetics-inference.serviceAccountName" . }}
      volumes:
        - name: model
          emptyDir: {}
      initContainers:
        # Pull the model artifact from S3 into the shared volume before the app
        # starts (auth via the ServiceAccount's IRSA role).
        - name: fetch-model
          image: {{ .Values.model.awscliImage }}
          command:
            - sh
            - -c
            - aws s3 cp {{ .Values.model.s3Uri }} {{ .Values.model.mountPath }}/ --recursive
          volumeMounts:
            - name: model
              mountPath: {{ .Values.model.mountPath }}
      containers:
        - name: inference
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: MODEL_DIR
              value: {{ .Values.model.mountPath | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelExporterOtlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.observability.logLevel | quote }}
          volumeMounts:
            - name: model
              mountPath: {{ .Values.model.mountPath }}
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
