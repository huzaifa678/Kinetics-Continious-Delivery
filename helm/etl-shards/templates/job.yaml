{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
# Indexed Job: `completions` shards, each pod builds shard = JOB_COMPLETION_INDEX.
# Reuses the training image (has the etl extra); overrides its torchrun entrypoint
# with kinetics-build-shards. Re-run = delete this Job first (Jobs are immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-etl-shards
spec:
  completionMode: Indexed
  completions: {{ .Values.numShards }}
  parallelism: {{ .Values.parallelism }}
  backoffLimit: {{ .Values.backoffLimit }}
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: dataset
          persistentVolumeClaim:
            claimName: {{ .Values.data.fsxClaimName }}
      containers:
        - name: build-shards
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Override the training image's torchrun entrypoint. JOB_COMPLETION_INDEX
          # is injected by the indexed Job -> the per-pod shard id.
          command: ["sh", "-lc"]
          args:
            - >-
              kinetics-build-shards
              --manifest {{ .Values.manifest }}
              --output {{ .Values.outputS3 }}
              --num-shards {{ .Values.numShards }}
              --shard-id "$JOB_COMPLETION_INDEX"
              --clip-length {{ .Values.clipLength }}
              --resize {{ .Values.resize }}
          volumeMounts:
            - name: dataset
              mountPath: {{ .Values.data.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
