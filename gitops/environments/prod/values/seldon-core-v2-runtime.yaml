---
# Seldon Core v2 runtime — PROD. Kafka ENABLED: Pipelines (async dataflow) run
# on Amazon MSK (broker + SASL/SCRAM wiring is in seldon-core-v2-setup.yaml). The
# Kafka-dependent components are therefore ON (chart default). The sync Model +
# A/B Experiment path (client -> Envoy -> Agent -> MLServer) still works unchanged
# and simply doesn't use Kafka.
dataflow:
  disable: false
pipelinegateway:
  disable: false
modelgateway:
  disable: false

# In-cluster only. Defaults are LoadBalancer (public AWS NLBs); the FastAPI edge
# reaches Envoy over cluster DNS (seldon-mesh.seldon-mesh), so keep these private.
scheduler:
  serviceType: ClusterIP
envoy:
  serviceType: ClusterIP
