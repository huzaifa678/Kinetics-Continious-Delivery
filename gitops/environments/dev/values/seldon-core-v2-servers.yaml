# Seldon Core v2 stock servers. Keep one MLServer (useful for smoke-testing the
# mesh with a trivial model); drop Triton — unused here and it costs a whole
# StatefulSet. The CNN-LSTM action recognizer runs on a CUSTOM MLServer Server
# (built from kinetics_trainer.serving, wrapping Predictor) added in a later
# phase, not on these stock servers.
mlserver:
  replicas: 1
triton:
  replicas: 0
  minReplicas: 0
  maxReplicas: 0
