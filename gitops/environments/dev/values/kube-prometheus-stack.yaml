# kube-prometheus-stack Helm values for the dev cluster.

# --- AWS Managed Prometheus (AMP) remote_write (hybrid observability) ---
# The in-cluster Prometheus keeps scraping (dcgm/node/kube-state) AND ships a
# durable copy to AMP, so metrics survive `terraform destroy`. Auth is SigV4 via
# EKS Pod Identity bound to the `kube-prometheus-stack-prometheus` SA
# (terraform: enable_managed_prometheus -> the amp-remote-write role+association).
prometheus:
  prometheusSpec:
    remoteWrite:
      - url: ""
        sigv4:
          region: us-east-1
        queueConfig:
          capacity: 2500
          maxSamplesPerSend: 1000
          maxShards: 200
grafana:
  enabled: true
  defaultDashboardsEnabled: true
  additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.observability:3200
