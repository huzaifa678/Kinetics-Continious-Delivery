# App-of-apps for the standalone Applications under gitops/apps/ (the in-repo
# Karpenter config chart and the training workload). Together with
# applicationset.yaml in this same folder, pointing a bootstrap Application at
# gitops/bootstrap deploys the entire platform.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-standalone-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
    targetRevision: main
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
