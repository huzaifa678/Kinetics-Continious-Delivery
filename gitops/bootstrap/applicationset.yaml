---
# Single ApplicationSet that generates an Application for every upstream Helm
# chart under gitops/infra/* and gitops/observability/*.
#
# De-hardcoding pattern:
#   * matrix = {cluster} x {chart catalog}. The CLUSTERS generator supplies the
#     target environment from the cluster Secret's `environment` label, so each
#     cluster self-selects its overlay — the SAME ApplicationSet on `main` serves
#     dev and prod simultaneously (true multi-cluster). Terraform stamps that label
#     on the in-cluster Secret from var.environment (modules/addons).
#   * The git generator reads each app's catalog file (chart coordinates only).
#   * Each Application is multi-source: source[0] is the upstream chart; source[1]
#     is THIS repo as a `$values` ref, so the chart's values come from
#     gitops/environments/<environment>/values/<app>.yaml.
#
# In-repo charts (Karpenter NodePool/EC2NodeClass) and the training workload are
# standalone Applications under gitops/apps/ (different sync semantics).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kinetics-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    # matrix = {cluster (env from its label)} x {chart catalog}. The clusters
    # generator exposes .server + .metadata.labels.environment for each registered
    # cluster Secret;
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - git:
              repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
              revision: main
              files:
                - path: gitops/infra/*/app.yaml
                - path: gitops/observability/*/app.yaml
  template:
    metadata:
      # Name from the git file's directory basename (gitops/infra/<app>/), NOT
      # `.name`: in a clusters × git matrix the clusters generator also sets
      # `.name` (the cluster), which collides and names every app after the
      # cluster ("duplicate name: in-cluster"). basename is git-only, no clash.
      name: '{{ .path.basename }}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: '{{ .server }}'
        namespace: '{{ .namespace }}'
      sources:
        - repoURL: '{{ .chartRepoURL }}'
          chart: '{{ .chartName }}'
          targetRevision: '{{ .chartVersion }}'
          helm:
            # Env from the cluster's `environment` label. ignoreMissingValueFiles
            # so a cluster whose env has no overlay (e.g. test) falls back to chart
            # defaults instead of erroring.
            ignoreMissingValueFiles: true
            # Base (hand-authored) then generated (terraform contract) -- later
            # wins. generated/<app>.yaml is rendered by
            # scripts/render-generated-values.py from the SSM gitops-contract and
            # is absent for apps with no template (ignoreMissingValueFiles).
            valueFiles:
              - '$values/gitops/environments/{{ .metadata.labels.environment }}/values/{{ .path.basename }}.yaml'
              - '$values/gitops/environments/{{ .metadata.labels.environment }}/values/generated/{{ .path.basename }}.yaml'
        - repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
          targetRevision: main
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          # ServerSideApply defaults ON, disableable per catalog entry
          # (`serverSideApply: false` in the app.yaml -> renders
          # `ServerSideApply=false` = client-side). Seldon Core v2 setup/runtime/
          # servers charts render optional CR fields as explicit `null` (e.g.
          # SeldonConfig.components[].annotations, SeldonRuntime.overrides[].podSpec,
          # Server.spec.podSpec); SSA rejects those nulls at admission ("must be of
          # type object: null"), while client-side apply prunes them on create.
          # crds stays ON (big CRDs exceed the client-side last-applied limit).
          - 'ServerSideApply={{ dig "serverSideApply" "true" . }}'
          # Multi-chart bundles (e.g. Seldon Core v2: crds -> setup -> runtime ->
          # servers) install out of order under independent auto-sync; this lets
          # the dependent apps apply + self-heal instead of erroring on the not-
          # yet-created CRDs. Harmless for single-chart apps.
          - SkipDryRunOnMissingResource=true
