---
# ETL shard-generation workload, wrapped in a clusters-generator ApplicationSet
# so the target environment is derived from the destination cluster label. This
# allows each environment to consume its own generated values (data bucket, FSx
# filesystem/PVC, IAM service account, S3 output prefix, resource sizing, etc.)
# without maintaining separate Applications. The WorkflowTemplate is managed by
# Argo CD, while actual Workflow executions are submitted on demand (or later by
# Argo Events), since dataset preprocessing is a run-once batch operation rather
# than a continuously reconciled service.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: etl-shards
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  templatePatch: |
    {{- if eq .metadata.labels.environment "dev" }}
    metadata:
      annotations:
        argocd-image-updater.argoproj.io/image-list: training=533267178572.dkr.ecr.us-east-1.amazonaws.com/kinetics-training
        argocd-image-updater.argoproj.io/training.update-strategy: newest-build
        argocd-image-updater.argoproj.io/training.allow-tags: regexp:^sha-
        argocd-image-updater.argoproj.io/training.helm.image-name: image.repository
        argocd-image-updater.argoproj.io/training.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: git
        argocd-image-updater.argoproj.io/git-branch: main
        argocd-image-updater.argoproj.io/write-back-target: helmvalues:/helm/etl-shards/values.yaml
    {{- end }}
  template:
    metadata:
      name: etl-shards
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
          targetRevision: main
          path: helm/etl-shards
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - values.yaml
              - $values/gitops/environments/{{ .metadata.labels.environment }}/values/generated/etl-shards.yaml
        - repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
          targetRevision: main
          ref: values
      destination:
        server: '{{ .server }}'
        namespace: shards
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
