# The inference backend, from the in-repo Helm chart. Unlike the training job
# (manual sync, consumes GPUs), inference is CPU-only and safe to AUTO-sync: a git
# push reconciles the Deployment + Service + ServiceMonitor automatically.
# Standalone (not in the ApplicationSet) so its image tag is bumped per-deploy by
# CI, like the training chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kinetics-inference
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
    targetRevision: main
    path: helm/inference-service
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
