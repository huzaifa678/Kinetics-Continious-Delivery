# Karpenter cluster config (NodePool + EC2NodeClass), from the in-repo chart so
# nodeRole / discovery tag come from chart values (gitops/config/karpenter/values.yaml),
# not hardcoded in the CRs. Standalone (not in the ApplicationSet) because it's an
# in-repo path with sync-wave ordering after the controller's CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
    targetRevision: main
    path: gitops/config/karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2
