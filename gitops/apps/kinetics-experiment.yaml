apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kinetics-experiment
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: seldon=533267178572.dkr.ecr.us-east-1.amazonaws.com/kinetics-training
    argocd-image-updater.argoproj.io/seldon.update-strategy: newest-build
    argocd-image-updater.argoproj.io/seldon.allow-tags: regexp:^seldon-
    argocd-image-updater.argoproj.io/seldon.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/seldon.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:/gitops/config/seldon-experiment/values.yaml
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
    targetRevision: main
    path: gitops/config/seldon-experiment
  destination:
    server: https://kubernetes.default.svc
    namespace: seldon-mesh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Models/Experiment/Server CRDs are installed by the seldon-core-v2 apps;
      # tolerate them being created out-of-order on first sync.
      - SkipDryRunOnMissingResource=true
