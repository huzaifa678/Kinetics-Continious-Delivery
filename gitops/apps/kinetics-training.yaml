# The training job, from the in-repo Helm chart. MANUAL sync by default so a git
# push never silently launches a GPU run (the PyTorchJob only consumes GPUs when
# HyperPod GPU nodes exist). Standalone (not in the ApplicationSet) for this reason.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kinetics-training
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/huzaifa678/Kinetics-Continious-Delivery.git
    targetRevision: main
    path: helm/training-job
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: training
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
