---
# EC2NodeClass — AWS launch settings Karpenter uses for nodes. References the
# node IAM role (Terraform) and discovers subnets/SGs by the karpenter.sh/discovery
# tag (set in the vpc/eks modules). Values come from env, not hardcoded.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest # AL2023; alias implies the AMI family
  role: {{ .Values.nodeRole }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.discoveryTag }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.discoveryTag }}
  tags:
    karpenter.sh/discovery: {{ .Values.discoveryTag }}
    Project: {{ .Values.project }}
