# Custom MLServer server: the stock mlserver ServerConfig with our image swapped
# in, so the KineticsRuntime (PyAV + torch + CNNLSTM) is available. Models that
# require the `kinetics` capability are scheduled here.
apiVersion: mlops.seldon.io/v1alpha1
kind: Server
metadata:
  name: {{ .Values.server.name }}
  namespace: {{ .Values.namespace }}
spec:
  serverConfig: {{ .Values.server.serverConfig }}
  replicas: {{ .Values.server.replicas }}
  extraCapabilities:
    - {{ .Values.server.capability }}
  podSpec:
    containers:
      - name: mlserver
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
          # Default runtime for models on this server whose artifact carries no
          # model-settings.json (our MLflow artifacts ship only the weights+config).
          - name: MLSERVER_MODEL_IMPLEMENTATION
            value: {{ .Values.server.implementation | quote }}
